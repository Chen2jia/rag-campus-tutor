services:
  postgres:
    image: postgres:15
    container_name: edumate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edumate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edumate"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edumate-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    container_name: edumate-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-EduMate}
      APP_ENV: ${APP_ENV:-development}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/edumate}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-change-me}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  migrate:
    build:
      context: ./backend
    container_name: edumate-migrate
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@postgres:5432/edumate}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-change-me}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: edumate-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
